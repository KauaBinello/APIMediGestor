<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes</title>
    <link rel="stylesheet" href="clientes.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="clientes.js" type="module" defer></script>
</head>

<body>

    <h1 id="table">Gerenciamento de Clientes</h1>

    <div class="toolbar-container">
        <input id="campo-pesquisa" placeholder="🔎 Buscar cliente pelo nome...">

        <div class="button-group">
            <button id="btnPaginacaoMenos" title="Anterior">
                <i data-lucide="chevron-left"></i>
            </button>
            <button id="btnPaginacao" title="Próximo">
                <i data-lucide="chevron-right"></i>
            </button>
            <button id="cadastrar-novo">
                <i data-lucide="plus-circle"></i> Novo Cliente
            </button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>Nascimento</th>
                <th>Cidade - UF</th>
                <th style="text-align: center;">Ações</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela">
        </tbody>
    </table>

    <div id="modal-container">
        <div id="caixa-modal">
            <h2 id="tituloModal">Novo Cliente</h2>

            <div class="modal-scroll-content">
                <label for="editNome">Nome Completo</label>
                <input id="editNome" placeholder="Ex: João da Silva">

                <label for="editCpf">CPF</label>
                <input id="editCpf" placeholder="Ex: 000.000.000-00">

                <label for="editTelefone">Telefone</label>
                <input id="editTelefone" placeholder="Ex: (00) 90000-0000">

                <label for="editNascimento">Data de Nascimento</label>
                <input id="editNascimento" type="date">

                <label for="editEndereco">Endereço (Rua/Av)</label>
                <input id="editEndereco" placeholder="Ex: Rua das Flores">

                <label for="editNumero">Número</label>
                <input id="editNumero" placeholder="Ex: 123">

                <label for="editBairro">Bairro</label>
                <input id="editBairro" placeholder="Ex: Centro">

                <label for="editCidade">Cidade</label>
                <input id="editCidade" placeholder="Ex: São Paulo">

                <label for="editUf">UF</label>
                <input id="editUf" placeholder="Ex: SP" maxlength="2">
            </div>

            <div class="modal-footer">
                <button id="btn-salvar">Salvar</button>
                <button id="btn-limpar">Limpar</button>
                <button class="btn-cancelar" id="btn-fechar-modal">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-aviso-container" class="modal-overlay">
        <div id="caixa-aviso" class="modal-content">
            <div id="aviso-icone"></div>
            <h3 id="aviso-titulo">Atenção</h3>
            <p id="aviso-texto">Mensagem de exemplo.</p>
            <div class="modal-footer" id="aviso-footer">
                <button id="btn-aviso-ok">OK</button>
                <button id="btn-aviso-cancelar" class="btn-cancelar">Cancelar</button>
            </div>
        </div>
    </div>
</body>

</html>
